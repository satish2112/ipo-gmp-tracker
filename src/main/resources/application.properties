# ─── Server ──────────────────────────────────────────────────────────────────
server.port=${PORT:8080}
server.servlet.context-path=/

# ─── MongoDB ─────────────────────────────────────────────────────────────────
spring.data.mongodb.uri=${MONGO_URI:mongodb+srv://root:root@cluster0.vyesiat.mongodb.net/ipo_gmp_tracker?retryWrites=true&w=majority&appName=Cluster0}
spring.data.mongodb.database=${MONGO_DB:ipo_gmp_tracker}

# ─── Thymeleaf ───────────────────────────────────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8

# ─── Security ────────────────────────────────────────────────────────────────
app.admin.username=${ADMIN_USERNAME:admin}
app.admin.password=${ADMIN_PASSWORD:admin123}

# ─── WebSocket broadcast ─────────────────────────────────────────────────────
# Pushes cached MongoDB data to WebSocket clients every 45s — no external API call
app.gmp.refresh-interval-ms=${GMP_REFRESH_INTERVAL_MS:45000}
app.gmp.initial-delay-ms=${GMP_INITIAL_DELAY_MS:10000}

# ─── ipoalerts.in API ────────────────────────────────────────────────────────
#
# Free Plan limits (confirmed from docs):
#   - 750 requests / month
#   - 25 requests / day  (plan quota cap)
#   - 6 requests / minute (rate limit)
#   - 1 IPO per request   (free plan max limit)
#   - GMP data: PAID addon only — null on free plan
#
# Budget math (safe under 25/day and 6/min):
#   3 sync runs/day  x  8 IPOs max/run  =  24 API calls/day  ✓
#   500ms delay between calls           =  2 calls/sec (well under 6/min) ✓
#
# Sync cron (stored as UTC — IST is UTC+5:30):
#   0 30 1,9,17 * * *  =  01:30, 09:30, 17:30 UTC
#                       =  07:00, 15:00, 23:00 IST
#
# To disable live API and use mock mode (local dev):
#   Set ipoalerts.api.enabled=false
#
ipoalerts.api.key=${IPOALERTS_API_KEY:db29dca5b60914b54942ed64eb8b87dc2e6c4b788b0e402954cb70875bb1ef7e}
ipoalerts.api.base-url=${IPOALERTS_BASE_URL:https://api.ipoalerts.in}
ipoalerts.api.daily-limit=${IPOALERTS_DAILY_LIMIT:25}
ipoalerts.api.max-per-run=${IPOALERTS_MAX_PER_RUN:8}
ipoalerts.api.sync-cron=${IPOALERTS_SYNC_CRON:0 15 1,9,17 * * *}
ipoalerts.api.enabled=${IPOALERTS_ENABLED:true}

# ─── Actuator ────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true
info.app.name=IPO GMP Tracker
info.app.version=1.0.0

# ─── Logging ─────────────────────────────────────────────────────────────────
logging.level.com.ipogmp=INFO
logging.level.com.ipogmp.tracker.service.GmpDataService=DEBUG
logging.level.org.springframework.data.mongodb=WARN
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{HH:mm:ss} %-5level [%15.15t] %-40.40logger{39} : %msg%n
