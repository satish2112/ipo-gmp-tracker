<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login — IPO GMP Tracker</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="bg-dark text-light d-flex align-items-center justify-content-center" style="min-height:100vh">
<div class="card bg-black border-secondary shadow-lg" style="width:100%;max-width:400px">
    <div class="card-body p-4">
        <div class="text-center mb-4">
            <span style="font-size:3rem">📈</span>
            <h4 class="fw-bold mt-2">IPO GMP Tracker</h4>
            <small class="text-secondary">Admin Login</small>
        </div>

        <div th:if="${param.error}" class="alert alert-danger py-2 small">
            <i class="bi bi-exclamation-circle me-1"></i> Invalid username or password.
        </div>
        <div th:if="${param.logout}" class="alert alert-success py-2 small">
            <i class="bi bi-check-circle me-1"></i> You have been logged out.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label fw-semibold">Username</label>
                <input type="text" name="username" class="form-control bg-dark text-light border-secondary"
                       placeholder="admin" required autofocus/>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Password</label>
                <input type="password" name="password" class="form-control bg-dark text-light border-secondary"
                       placeholder="••••••••" required/>
            </div>
            <button type="submit" class="btn btn-warning w-100 fw-semibold">
                <i class="bi bi-box-arrow-in-right me-1"></i> Login
            </button>
        </form>
        <div class="text-center mt-3">
            <a href="/" class="text-secondary small">← Back to Dashboard</a>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
